<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "MatchGrid" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="slock-body">
    <div class="slock-bg" aria-hidden="true"></div>
    <div class="page-shell page-shell--app">
      <header class="app-bar nb-bar">
        <a class="brand-slock" href="{{ url_for('index') }}">
          <span class="brand-slock__mark">MG</span>
          <div class="brand-slock__copy">
            <span class="brand-slock__eyebrow">MatchGrid</span>
            <span class="brand-slock__title">LINEUP LAB</span>
          </div>
        </a>
        <div class="app-bar__meta">
          {% if board_ready %}
          <span class="nb-pill nb-pill--cyan">{{ roster_count }} IN ROSTER</span>
          {% else %}
          <span class="nb-pill nb-pill--amber">NO ROSTER</span>
          {% endif %}
          <span class="nb-clock" data-live-clock>--:--:--</span>
        </div>
      </header>

      {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='shell.js') }}"></script>
  </body>
</html>
